<script>

document.getElementById("checkoutForm")
.addEventListener("submit",function(e){

e.preventDefault();

let valid=true;


// lấy dữ liệu

let name=document.getElementById("fullName").value.trim();

let phone=document.getElementById("phone").value.trim();


// thẻ báo lỗi

let nameError=document.getElementById("nameError");

let phoneError=document.getElementById("phoneError");


// reset lỗi

nameError.innerHTML="";

phoneError.innerHTML="";


// regex tên (cho phép tiếng Việt)

let nameRegex=/^[a-zA-ZÀ-ỹ\s]+$/;


// kiểm tra tên

if(name==""){

nameError.innerHTML="Chưa nhập họ tên";

valid=false;

}

else if(!nameRegex.test(name)){

nameError.innerHTML=
"Tên không chứa số hoặc ký tự đặc biệt";

valid=false;

}

else if(name.length<2){

nameError.innerHTML="Tên quá ngắn";

valid=false;

}




let phoneRegex=/^0[35789]\d{8}$/;



if(phone==""){

phoneError.innerHTML="Chưa nhập SĐT";

valid=false;

}

else if(!phoneRegex.test(phone)){

phoneError.innerHTML=
"SĐT không hợp lệ (bắt đầu bằng 0, 10 số)";

valid=false;

}




if(valid){

window.location.href="thanhcong.html";

}

});

</script>
